name: Dependencies Test - Node.js

on:
  workflow_dispatch:

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Enable Corepack + pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
      
      - name: Install dependencies
        working-directory: apps
        run: pnpm install --no-lockfile
      
      - name: Build
        working-directory: apps
        run: pnpm -r run build
      
      - name: Install Chrome
        working-directory: apps
        run: pnpm dependencies:chrome
      
      - name: Install Firefox
        working-directory: apps
        run: pnpm dependencies:firefox
      
      - name: Verify Chrome
        working-directory: apps
        run: pnpm verify:chrome
      
      - name: Verify Firefox
        working-directory: apps
        run: pnpm verify:firefox

  windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Enable Corepack + pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
      
      - name: Install dependencies
        working-directory: apps
        run: pnpm install --no-lockfile
     
      - name: Build
        working-directory: apps
        run: pnpm -r run build
      
      - name: Install Chrome
        working-directory: apps
        run: pnpm dependencies:chrome
      
      - name: Install Firefox
        working-directory: apps
        run: pnpm dependencies:firefox
      
      - name: Verify Chrome
        working-directory: apps
        run: pnpm verify:chrome
      
      - name: Verify Firefox
        working-directory: apps
        run: pnpm verify:firefox
