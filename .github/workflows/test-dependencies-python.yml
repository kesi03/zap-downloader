name: Dependencies Test - Python

on:
  workflow_dispatch:

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e apps/zap-downloader
      
      - name: Test chrome command
        run: sudo zap-downloader dependencies chrome
      
      - name: Test firefox command
        run: sudo zap-downloader dependencies firefox

  windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e apps/zap-downloader
      
      - name: Test chrome command
        run: zap-downloader dependencies chrome
      
      - name: Test firefox command
        run: zap-downloader dependencies firefox
