name: Publish - Node.js

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0, patch, minor, major)'
        required: true
        default: 'patch'
  push:
    tags:
      - 'node-v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Enable Corepack + pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
      
      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
      
      - name: Install dependencies
        working-directory: apps/zap-downloader-node
        run: pnpm install --frozen-lockfile
      
      - name: Build
        working-directory: apps/zap-downloader-node
        run: pnpm build
      
      - name: Version bump
        id: version
        working-directory: apps/zap-downloader-node
        run: |
          if [[ "${{ inputs.version }}" == "patch" ]] || [[ "${{ inputs.version }}" == "minor" ]] || [[ "${{ inputs.version }}" == "major" ]]; then
            pnpm version ${{ inputs.version }}
          else
            pnpm version ${{ inputs.version }} --no-git-tag-version
          fi
          echo "version=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_OUTPUT
      
      - name: Publish to npm
        working-directory: apps/zap-downloader-node
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Push Changes and Tag
        working-directory: apps/zap-downloader-node
        run: git push origin main --follow-tags
