name: Publish - Python

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0, patch, minor, major)'
        required: true
        default: 'patch'
  push:
    tags:
      - 'python-v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          registry-url: 'https://upload.pypi.org/legacy/'
      
      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
      
      - name: Install build dependencies
        run: pip install build twine toml
      
      - name: Version bump
        id: version
        run: |
          cd apps/zap-downloader
          if [[ "${{ inputs.version }}" == "patch" ]] || [[ "${{ inputs.version }}" == "minor" ]] || [[ "${{ inputs.version }}" == "major" ]]; then
            CURRENT_VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
            if [[ "${{ inputs.version }}" == "patch" ]]; then
              IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
              NEW_VERSION="${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.$((${VERSION_PARTS[2]} + 1))"
            elif [[ "${{ inputs.version }}" == "minor" ]]; then
              IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
              NEW_VERSION="${VERSION_PARTS[0]}.$((${VERSION_PARTS[1]} + 1)).0"
            elif [[ "${{ inputs.version }}" == "major" ]]; then
              IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
              NEW_VERSION="$((${VERSION_PARTS[0]} + 1)).0.0"
            fi
            sed -i "s/version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" pyproject.toml
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            git add pyproject.toml
            git commit -m "Bump version to $NEW_VERSION"
          else
            sed -i "s/version = \".*\"/version = \"${{ inputs.version }}\"/" pyproject.toml
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            git add pyproject.toml
            git commit -m "Bump version to ${{ inputs.version }}"
          fi
      
      - name: Build package
        working-directory: apps/zap-downloader
        run: python -m build
      
      - name: Publish to PyPI
        working-directory: apps/zap-downloader
        run: twine upload dist/*
      
      - name: Push Changes
        run: git push origin main --follow-tags
